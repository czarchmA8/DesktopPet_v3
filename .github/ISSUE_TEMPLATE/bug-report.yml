name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the sections below to help everyone identify and fix the bug
  - type: textarea
    id: description
    attributes:
      label: Describe your issue
      placeholder: When I click here this happens
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to page X
        2. Click here
        3. Click there
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was the expected result? (optional)
      placeholder: I expected this to happen
  - type: textarea
    id: cause
    attributes:
      label: Probable cause (optional)
      placeholder: This issue is probably caused by
  - type: textarea
    id: screenshots
    attributes:
      label: Put here any screenshots or videos (optional)
  - type: textarea
    id: affected-files
    attributes:
      label: Files that probably need to be edited (optional)
      placeholder: |
        List any files or components you think are related to this bug, e.g.:
        - README.md
        - src/utils/api.ts
  - type: dropdown
    id: assign
    attributes:
      label: "Would you like to work on this issue? (optional)"
      options:
        - "No"
        - "Yes"
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue! We will get back to you as soon as possible.
